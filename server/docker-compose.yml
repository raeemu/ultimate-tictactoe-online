version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: ultimate_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: ultimate_tictactoe
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ultimate_redis
    restart: always
    ports:
      - '6379:6379'

volumes:
  postgres_data: